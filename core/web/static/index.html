  function renderActiveSession() {
    clearMessages();
    const session = getActiveSession();
    if (!session || !session.messages.length) {
      welcomeEl.style.display = 'block';
      syncExecutionIndicatorVisibility();
      scrollToBottom();
      return;
    }
    ensureMessageIds(session);
    welcomeEl.style.display = 'none';
    for (let i = 0; i < session.messages.length; i += 1) {
      const msg = session.messages[i];
      if (msg.role === 'user') addUserBubble(msg, i);
      if (msg.role === 'assistant') addAssistantBubble(msg, i);
    }
    syncExecutionIndicatorVisibility();
    scrollToBottom();
  }

  function addTypingIndicator() {
    removeTypingIndicator();
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'typing-indicator';
    div.innerHTML = `<div class="avatar-col"><div class="avatar"><img src="${ASSISTANT_AVATAR_SRC}" alt="Assistant"></div><div class="msg-time">...</div></div><div class="bubble"><div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>`;
    messagesEl.appendChild(div);
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function upsertExecutionIndicator(commandText, startedAt) {
    let el = document.getElementById('execution-indicator');
    const label = String(commandText || '').trim() || '执行中';
    const pretty = formatExecutionCommandForDisplay(label);
    const elapsed = formatDuration(Date.now() - Number(startedAt || Date.now()));

    if (!el) {
      el = document.createElement('div');
      el.className = 'msg assistant';
      el.id = 'execution-indicator';
      el.innerHTML = `<div class="avatar-col"><div class="avatar"><img src="${ASSISTANT_AVATAR_SRC}" alt="Assistant"></div><div class="msg-time">run</div></div><div class="bubble"><div class="exec-live"><div class="exec-live-title" id="execution-indicator-title"></div><div class="exec-live-time" id="execution-indicator-time"></div></div></div>`;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    const titleEl = document.getElementById('execution-indicator-title');
    const timeEl = document.getElementById('execution-indicator-time');
    if (titleEl) {
      titleEl.textContent = `正在执行:\n${pretty}`;
      titleEl.title = label;
    }
    if (timeEl) {
      timeEl.textContent = `已运行 ${elapsed}`;
    }
  }

  function removeExecutionIndicator() {
    const el = document.getElementById('execution-indicator');
    if (el) el.remove();
  }

  function syncExecutionIndicatorVisibility() {
    const shouldShow = Boolean(
      state.execution.active &&
      state.execution.sessionId &&
      state.execution.sessionId === state.activeSessionId
    );

    if (!shouldShow) {
      removeExecutionIndicator();
      return;
    }

    upsertExecutionIndicator(state.execution.text, state.execution.startedAt);
  }

  function formatExecutionCommandForDisplay(command) {
    const raw = String(command || '').trim();
    if (!raw) return '执行中';

    let text = raw.replace(/\s+/g, ' ').trim();

    // 1) Break at explicit shell separators first.
    text = text.replace(/\s*(\|\||&&|;|\|)\s*/g, ' $1\n');

    // 2) Also break before common command keywords for long chained commands.
    text = text.replace(
      /\s(?=(source|conda|python|pip|which|export|git|docker|tmux|ls|cd|mkdir|cp|mv|rm|head|tail)\b)/gi,
      '\n'
    );

    // 3) Break before environment-style assignment blocks like FOO=$(...).
    text = text.replace(/\s(?=[A-Z_][A-Z0-9_]*=\$\()/g, '\n');

    // 4) Normalize accidental excessive blank lines.
    text = text.replace(/\n{3,}/g, '\n\n').trim();

    return text;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addCopyButtons(bubble) {
    bubble.querySelectorAll('pre').forEach(pre => {
      if (pre.querySelector('.copy-btn')) return;
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.type = 'button';
      btn.textContent = 'Copy';
      btn.addEventListener('click', () => {
        const code = pre.querySelector('code');
        const txt = code ? code.textContent : pre.textContent;
        navigator.clipboard.writeText(txt || '').then(() => {
          btn.textContent = 'Copied';
          setTimeout(() => { btn.textContent = 'Copy'; }, 1400);
        }).catch(() => {
          btn.textContent = 'Failed';
          setTimeout(() => { btn.textContent = 'Copy'; }, 1400);
        });
      });
      pre.appendChild(btn);
    });
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    const session = getActiveSession();
    const hasFiles = state.pendingFiles.length > 0;
    const hasSkills = state.selectedSkills.length > 0;
    if ((!text && !hasFiles && !hasSkills) || state.waiting || !session) return;

    const skillText = buildSkillInstruction(state.selectedSkills);
    const attachmentText = await buildAttachmentText(state.pendingFiles);
    const finalText = [text, skillText, attachmentText].filter(Boolean).join('\n\n').trim() || 'Please analyze the provided context.';
    const displayText = text || (hasFiles ? 'Uploaded files' : 'Use selected skills');
    const userMsgTime = nowISO();

    welcomeEl.style.display = 'none';
    session.messages.push({ id: newMessageId(), role: 'user', content: displayText, promptContent: finalText, time: userMsgTime });
    session.updatedAt = nowISO();
    state.sessions.sort((a, b) => (a.updatedAt < b.updatedAt ? 1 : -1));
    saveSessions();

    renderChatList();
    renderActiveSession();
    addTypingIndicator();
    scrollToBottom();

    inputEl.value = '';
    inputEl.style.height = 'auto';
    state.waiting = true;
    inputEl.disabled = true;
    setSendButtonMode('stop');
    setStatus('connected', 'Thinking');

    state.requestController = new AbortController();

    const priorHistory = session.messages.slice(0, -1)
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({ role: m.role, content: m.promptContent || m.content }));

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: state.requestController.signal,
        body: JSON.stringify({
          message: finalText,
          history: priorHistory,
          selected_skills: state.selectedSkills,
        }),
      });
      const data = await resp.json();
      removeTypingIndicator();

      if (!resp.ok || data.type === 'error') {
        showError(data.message || 'Chat request failed');
      } else {
        const reply = String(data.content || '');
        const modelUsed = String(data.model_used || '').trim();
        session.messages.push({ id: newMessageId(), role: 'assistant', content: reply, modelUsed, time: nowISO() });

        if (shouldAutoGenerateTitle(session)) {
          const modelTitle = await requestAutoTitle(displayText, reply);
          if (modelTitle) {
            session.title = modelTitle.slice(0, 64);
          }
        }

        session.updatedAt = nowISO();
        state.sessions.sort((a, b) => (a.updatedAt < b.updatedAt ? 1 : -1));
        saveSessions();
        renderChatList();
        renderActiveSession();
        clearPendingFiles();
        state.selectedSkills = [];
        renderSkills(state.skills);
        renderPendingFiles();
      }
    } catch (err) {
      removeTypingIndicator();
      if (!(err && err.name === 'AbortError')) {
        showError((err && err.message) ? err.message : 'Network error');
      }
    } finally {
      state.waiting = false;
      inputEl.disabled = false;
      setSendButtonMode('send');
      state.requestController = null;
      setStatus('connected', 'Ready');
      inputEl.focus();
      scrollToBottom();
    }
  }

  function applyTheme(theme) {
    state.theme = theme === 'dark' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', state.theme);
    document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === state.theme));
    savePrefs();
  }

  async function resendAsNewTurn(displayText, promptText) {
    const session = getActiveSession();
    if (!session || state.waiting) return;

    const userMsgTime = nowISO();
    welcomeEl.style.display = 'none';
    session.messages.push({ id: newMessageId(), role: 'user', content: displayText, promptContent: promptText, time: userMsgTime });
    session.updatedAt = nowISO();
    state.sessions.sort((a, b) => (a.updatedAt < b.updatedAt ? 1 : -1));
    saveSessions();
    renderChatList();
    renderActiveSession();
    addTypingIndicator();

    state.waiting = true;
    inputEl.disabled = true;
    setSendButtonMode('stop');
    setStatus('connected', 'Thinking');

    state.requestController = new AbortController();

    const priorHistory = session.messages.slice(0, -1)
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({ role: m.role, content: m.promptContent || m.content }));

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: state.requestController.signal,
        body: JSON.stringify({ message: promptText, history: priorHistory, selected_skills: [] }),
      });
      const data = await resp.json();
      removeTypingIndicator();
      if (!resp.ok || data.type === 'error') {
        showError(data.message || 'Chat request failed');
      } else {
        const reply = String(data.content || '');
        const modelUsed = String(data.model_used || '').trim();
        session.messages.push({ id: newMessageId(), role: 'assistant', content: reply, modelUsed, time: nowISO() });
        session.updatedAt = nowISO();
        state.sessions.sort((a, b) => (a.updatedAt < b.updatedAt ? 1 : -1));
        saveSessions();
        renderChatList();
        renderActiveSession();
      }
    } catch (err) {
      removeTypingIndicator();
      if (!(err && err.name === 'AbortError')) {
        showError((err && err.message) ? err.message : 'Network error');
      }
    } finally {
      state.waiting = false;
      inputEl.disabled = false;
      setSendButtonMode('send');
      state.requestController = null;
      setStatus('connected', 'Ready');
      inputEl.focus();
      scrollToBottom();
    }
  }

  function stopCurrentRequest() {
    if (state.requestController) {
      try {
        state.requestController.abort();
      } catch (_e) {}
    }
    removeTypingIndicator();
    state.waiting = false;
    inputEl.disabled = false;
    setSendButtonMode('send');
    state.requestController = null;
    setStatus('connected', 'Ready');
    inputEl.focus();
  }

  function resendPreviousUserMessage(session, userMsg) {
    if (!session || !userMsg || userMsg.role !== 'user') return;
    const displayText = String(userMsg.content || '').trim() || 'Previous user message';
    const promptText = String(userMsg.promptContent || userMsg.content || '').trim() || displayText;
    state.editingMessageId = null;
    saveSessions();
    renderChatList();
    renderActiveSession();
    resendAsNewTurn(displayText, promptText);
  }

  function normalizeEditText(text) {
    return String(text || '').replace(/\s+$/g, '');
  }

  function removeUserAndNextAssistant(session, userIdx) {
    if (userIdx < 0 || userIdx >= session.messages.length) return null;
    const userMsg = session.messages[userIdx];
    session.messages.splice(userIdx, 1);
    if (session.messages[userIdx] && session.messages[userIdx].role === 'assistant') {
      session.messages.splice(userIdx, 1);
    }
    return userMsg;
  }

  function removeAssistantAndPrevUser(session, assistantIdx) {
    if (assistantIdx < 0 || assistantIdx >= session.messages.length) return null;
    const assistantMsg = session.messages[assistantIdx];
    let userMsg = null;
    if (assistantIdx > 0 && session.messages[assistantIdx - 1].role === 'user') {
      userMsg = session.messages[assistantIdx - 1];
      session.messages.splice(assistantIdx, 1);
      session.messages.splice(assistantIdx - 1, 1);
      return userMsg;
    }
    session.messages.splice(assistantIdx, 1);
    return userMsg || assistantMsg;
  }

  function applySectionState() {
    const chatSection = document.getElementById('chat-section');
    const skillsSection = document.getElementById('skills-section');
    chatSection.classList.toggle('collapsed', !state.expanded.chat);
    skillsSection.classList.toggle('collapsed', !state.expanded.skills);
    savePrefs();
  }

  function bindEvents() {
    sendBtn.addEventListener('click', () => {
      if (state.waiting) {
        stopCurrentRequest();
        return;
      }
      sendMessage();
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
    });

    newChatBtn.addEventListener('click', () => {
      createSession('New Chat');
      inputEl.focus();
    });

    clearChatBtn.addEventListener('click', () => {
      clearAllSessions();
    });

    uploadBtnEl.addEventListener('click', () => {
      if (!state.waiting) fileInputEl.click();
    });

    fileInputEl.addEventListener('change', () => {
      addPendingFiles(fileInputEl.files);
      fileInputEl.value = '';
      inputEl.focus();
    });

    attachListEl.addEventListener('click', (e) => {
      const removeFileBtn = e.target.closest('[data-file-index]');
      if (removeFileBtn) {
        const idx = Number(removeFileBtn.dataset.fileIndex);
        if (!Number.isNaN(idx) && idx >= 0 && idx < state.pendingFiles.length) {
          state.pendingFiles.splice(idx, 1);
          renderPendingFiles();
        }
        return;
      }

      const removeSkillBtn = e.target.closest('[data-skill-index]');
      if (removeSkillBtn) {
        const idx = Number(removeSkillBtn.dataset.skillIndex);
        if (!Number.isNaN(idx) && idx >= 0 && idx < state.selectedSkills.length) {
          state.selectedSkills.splice(idx, 1);
          renderSkills(state.skills);
          renderPendingFiles();
        }
      }
    });

    chatListEl.addEventListener('click', (e) => {
      const menuToggleBtn = e.target.closest('[data-menu-toggle-id]');
      if (menuToggleBtn) {
        e.preventDefault();
        e.stopPropagation();
        const sessionId = menuToggleBtn.dataset.menuToggleId;
        if (state.openSessionMenuId === sessionId) {
          state.openSessionMenuId = null;
          state.menuPosition = null;
        } else {
          const rect = menuToggleBtn.getBoundingClientRect();
          const menuWidth = 132;
          const left = Math.max(8, Math.min(rect.right - menuWidth, window.innerWidth - menuWidth - 8));
          const top = Math.min(rect.bottom + 6, window.innerHeight - 132);
          state.openSessionMenuId = sessionId;
          state.menuPosition = { top, left };
        }
        renderChatList();
        return;
      }

      const menuActionBtn = e.target.closest('[data-menu-action]');
      if (menuActionBtn) {
        e.preventDefault();
        e.stopPropagation();
        const action = menuActionBtn.dataset.menuAction;
        const sessionId = menuActionBtn.dataset.menuId;
        state.openSessionMenuId = null;
        state.menuPosition = null;
        if (action === 'export') exportSession(sessionId);
        if (action === 'rename') renameSession(sessionId);
        if (action === 'delete') deleteSession(sessionId);
        return;
      }

      const item = e.target.closest('[data-session-id]');
      if (!item) return;
      setActiveSession(item.dataset.sessionId);
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.chat-menu-wrap') && state.openSessionMenuId !== null) {
        state.openSessionMenuId = null;
        state.menuPosition = null;
        renderChatList();
      }
    });

    chatListEl.addEventListener('dblclick', (e) => {
      const item = e.target.closest('[data-session-id]');
      if (!item) return;
      renameSession(item.dataset.sessionId);
    });

    chatListEl.addEventListener('keydown', (e) => {
      const item = e.target.closest('[data-session-id]');
      if (!item) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        setActiveSession(item.dataset.sessionId);
      }
    });

    skillListEl.addEventListener('click', (e) => {
      const infoBtn = e.target.closest('[data-skill-info]');
      if (infoBtn) {
        e.preventDefault();
        e.stopPropagation();
        const skillName = infoBtn.dataset.skillInfo;
        if (skillName) openSkillInfo(skillName);
        return;
      }

      const item = e.target.closest('[data-skill-name]');
      if (!item) return;
      const skillName = item.dataset.skillName;
      if (!skillName) return;
      toggleSkillSelection(skillName);
      inputEl.focus();
    });

    skillListEl.addEventListener('keydown', (e) => {
      const item = e.target.closest('[data-skill-name]');
      if (!item) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        const skillName = item.dataset.skillName;
        if (!skillName) return;
        toggleSkillSelection(skillName);
        inputEl.focus();
      }
    });

    skillInfoCloseEl.addEventListener('click', closeSkillInfo);

    skillInfoOverlayEl.addEventListener('click', (e) => {
      if (e.target === skillInfoOverlayEl) closeSkillInfo();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && skillInfoOverlayEl.classList.contains('open')) {
        closeSkillInfo();
      }
    });

    messagesEl.addEventListener('click', (e) => {
      const avatarBtn = e.target.closest('[data-user-avatar-trigger]');
      if (avatarBtn) {
        e.preventDefault();
        openAvatarPicker();
        return;
      }

      const actionBtn = e.target.closest('[data-msg-action]');
      if (!actionBtn) return;
      e.preventDefault();
      e.stopPropagation();

      const session = getActiveSession();
      if (!session) return;

      const action = actionBtn.dataset.msgAction;
      const msgId = actionBtn.dataset.msgId;
      if (!action || !msgId) return;
      const idx = findMessageIndexById(session, msgId);
      if (idx < 0) return;
      const msg = session.messages[idx];

      if (action === 'copy') {
        const textToCopy = String(msg.content || '');
        navigator.clipboard.writeText(textToCopy).catch(() => {});
        return;
      }

      if (action === 'delete') {
        session.messages.splice(idx, 1);
        state.editingMessageId = null;
        session.updatedAt = nowISO();
        saveSessions();
        renderChatList();
        renderActiveSession();
        return;
      }

      if (action === 'edit-user') {
        if (msg.role !== 'user') return;
        state.editingMessageId = msg.id;
        renderActiveSession();
        return;
      }

      if (action === 'cancel-edit') {
        state.editingMessageId = null;
        renderActiveSession();
        return;
      }

      if (action === 'save-edit' || action === 'send-edit') {
        if (msg.role !== 'user') return;
        const bubble = actionBtn.closest('.bubble');
        const textarea = bubble ? bubble.querySelector('.edit-textarea') : null;
        if (!textarea) return;
        const edited = normalizeEditText(textarea.value);
        if (!edited) return;

        msg.content = edited;
        msg.promptContent = edited;
        session.updatedAt = nowISO();
        state.editingMessageId = null;

        if (action === 'save-edit') {
          saveSessions();
          renderChatList();
          renderActiveSession();
          return;
        }

        removeUserAndNextAssistant(session, idx);
        saveSessions();
        renderChatList();
        renderActiveSession();
        resendAsNewTurn(edited, edited);
        return;
      }

      if (action === 'regenerate-user') {
        if (msg.role !== 'user') return;
        const removed = removeUserAndNextAssistant(session, idx);
        if (!removed) return;
        resendPreviousUserMessage(session, removed);
        return;
      }

      if (action === 'regenerate-assistant') {
        if (msg.role !== 'assistant') return;
        const pairedUser = removeAssistantAndPrevUser(session, idx);
        if (!pairedUser || pairedUser.role !== 'user') {
          saveSessions();
          renderChatList();
          renderActiveSession();
          return;
        }
        resendPreviousUserMessage(session, pairedUser);
      }
    });

    avatarPickerCloseEl.addEventListener('click', closeAvatarPicker);

    avatarPickerOverlayEl.addEventListener('click', (e) => {
      if (e.target === avatarPickerOverlayEl) closeAvatarPicker();
    });

    avatarPickerGridEl.addEventListener('click', (e) => {
      const optionBtn = e.target.closest('[data-avatar-id]');
      if (!optionBtn) return;
      const id = optionBtn.dataset.avatarId;
      if (!id) return;
      state.userAvatarId = id;
      savePrefs();
      renderAvatarPicker();
      renderActiveSession();
      closeAvatarPicker();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && avatarPickerOverlayEl.classList.contains('open')) {
        closeAvatarPicker();
      }
    });

    document.querySelectorAll('.nav-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.target;
        if (target === 'chat' || target === 'skills') {
          state.expanded[target] = !state.expanded[target];
          applySectionState();
        }
      });
    });

    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
    });

    modelSelect.addEventListener('change', async () => {
      if (!modelSelect.value) return;
      try {
        const choice = JSON.parse(modelSelect.value);
        setStatus('working', `Switching to ${choice.provider} / ${choice.model}`);
        await switchModel(choice.provider, choice.model);
      } catch (err) {
        setStatus('error', 'Model switch failed');
        showError(err && err.message ? err.message : 'Unable to switch model.');
        await loadEnv();
      }
    });
  }

  async function loadSkills() {
    try {
      const resp = await fetch('/api/skills');
      const data = await resp.json();
      renderSkills(data.skills || []);
    } catch (_e) {
      renderSkills([]);
    }
  }

  async function loadEnv() {
    try {
      const resp = await fetch('/api/env');
      const data = await resp.json();
      modelLabel.textContent = 'Model';
      state.availableModels = Array.isArray(data.available_models) ? data.available_models : [];
      renderModelOptions(data.provider, data.model);
      if (data.api_key_present === false) {
        setStatus('error', 'Setup required');
        showError('LLM API key missing. Please update neuroclaw_environment.json or set env key.');
      } else {
        setStatus('connected', 'Ready');
      }
    } catch (_e) {
      modelLabel.textContent = 'Model';
      state.availableModels = [];
      renderModelOptions('', '');
      setStatus('error', 'Offline');
      showError('Unable to fetch runtime environment.');
    }
  }

  function boot() {
    loadState();
    fileInputEl.setAttribute('accept', SUPPORTED_ATTACHMENT_EXTENSIONS.join(','));
    bindEvents();
    applyTheme(state.theme);
    applySectionState();
    setSendButtonMode('send');
    startShellStatusPolling();
    ensureSession();
    renderChatList();
    renderActiveSession();
    renderPendingFiles();
    loadSkills();
    loadEnv();
    inputEl.focus();
  }

  boot();
</script>
</body>
</html>
