<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroClaw</title>
  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface2:     #21262d;
      --border:       #30363d;
      --accent:       #58a6ff;
      --success:      #3fb950;
      --error:        #f85149;
      --text:         #c9d1d9;
      --text-muted:   #8b949e;
      --user-bg:      #1f6feb;
      --header-h:     52px;
      --sidebar-w:    260px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 20;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 600;
      color: var(--accent);
      user-select: none;
    }
    .logo-icon { font-size: 22px; }

    .model-badge {
      font-size: 11px;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 2px 9px;
      border-radius: 12px;
    }

    .spacer { flex: 1; }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.connected  { background: var(--success); }
    .status-dot.connecting { background: #e3b341; }
    .status-dot.error      { background: var(--error); }

    /* ── Error banner (below header) ───────────────────────────────────────── */
    #error-banner {
      display: none;
      background: rgba(248, 81, 73, .12);
      border-bottom: 1px solid var(--error);
      color: var(--error);
      font-size: 13px;
      padding: 8px 16px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Main content (sidebar + chat) ─────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #skill-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    .skill-item {
      padding: 7px 16px;
      cursor: pointer;
      border-radius: 4px;
      margin: 1px 8px;
      transition: background .12s;
    }
    .skill-item:hover { background: var(--surface2); }

    .skill-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .skill-desc {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    /* ── Chat area ─────────────────────────────────────────────────────────── */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Welcome screen */
    #welcome {
      text-align: center;
      padding: 70px 20px 0;
      color: var(--text-muted);
    }
    #welcome .logo-big { font-size: 48px; margin-bottom: 16px; }
    #welcome h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }
    #welcome p {
      font-size: 14px;
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── Message bubbles ───────────────────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 100%;
    }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .msg.user      .avatar { background: var(--user-bg); }
    .msg.assistant .avatar { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      max-width: min(680px, calc(100% - 80px));
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      overflow-x: auto;
    }
    .msg.user      .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    /* Markdown inside assistant bubbles */
    .bubble p          { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child  { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li         { margin: 2px 0; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 10px 0 4px; }
    .bubble h1 { font-size: 1.1em; }
    .bubble h2 { font-size: 1.05em; }
    .bubble h3 { font-size: 1em; }

    .bubble pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
      position: relative;
    }
    .bubble code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
      font-size: 12.5px;
    }
    .bubble :not(pre) > code {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12.5px;
    }
    .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 5px 10px; }
    .bubble th { background: var(--surface2); }
    .bubble blockquote {
      border-left: 3px solid var(--border);
      margin: 6px 0;
      padding: 4px 12px;
      color: var(--text-muted);
    }
    .bubble a { color: var(--accent); }

    /* Copy button for code blocks */
    .copy-btn {
      position: absolute;
      top: 6px; right: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
      font-family: inherit;
    }
    pre:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: var(--surface); color: var(--text); }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
    .dot {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.3s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ── Input area ────────────────────────────────────────────────────────── */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      line-height: 1.5;
      outline: none;
      transition: border-color .2s;
    }
    #msg-input:focus      { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-muted); }
    #msg-input:disabled   { opacity: .5; cursor: not-allowed; }

    #send-btn {
      width: 40px; height: 40px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s;
      font-size: 18px;
      color: #fff;
    }
    #send-btn:disabled        { opacity: .4; cursor: not-allowed; }
    #send-btn:not(:disabled):hover { opacity: .82; }

    /* ── Scrollbar ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Responsive: hide sidebar on narrow screens ─────────────────────────── */
    @media (max-width: 620px) { .sidebar { display: none; } }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <span class="logo-icon">🧠</span>
      <span>NeuroClaw</span>
    </div>
    <div class="model-badge" id="model-label">Connecting…</div>
    <div class="spacer"></div>
    <div class="status">
      <div class="status-dot connecting" id="status-dot"></div>
      <span id="status-text">Connecting</span>
    </div>
  </header>

  <div id="error-banner"></div>

  <div class="main">

    <!-- Skills sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">Skills</div>
      <div id="skill-list">
        <div style="padding:14px 16px;color:var(--text-muted);font-size:12px;">Loading…</div>
      </div>
    </aside>

    <!-- Chat container -->
    <div class="chat-container">
      <div id="messages">
        <div id="welcome">
          <div class="logo-big">🧠</div>
          <h2>Welcome to NeuroClaw</h2>
          <p>Neuroscience-first AI assistant. Describe the neuroimaging workflow, dataset, or analysis you need help with.</p>
        </div>
      </div>

      <div class="input-area">
        <textarea
          id="msg-input"
          placeholder="Ask NeuroClaw… (Enter to send, Shift+Enter for new line)"
          rows="1"
          disabled
        ></textarea>
        <button id="send-btn" disabled title="Send (Enter)">➤</button>
      </div>
    </div>

  </div>
</div>

<script>
  // ── marked.js configuration ───────────────────────────────────────────────
  marked.setOptions({
    breaks: true,
    gfm: true,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
      }
      return hljs.highlightAuto(code).value;
    },
  });

  // ── DOM references ────────────────────────────────────────────────────────
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const modelLabel  = document.getElementById('model-label');
  const skillListEl = document.getElementById('skill-list');
  const welcomeEl   = document.getElementById('welcome');
  const errorBanner = document.getElementById('error-banner');

  // ── State ─────────────────────────────────────────────────────────────────
  let ws = null;
  let currentBubble   = null;  // assistant bubble being streamed into
  let currentBubbleText = '';
  let isWaiting = false;
  let reconnectTimer = null;

  // ── WebSocket connection ──────────────────────────────────────────────────
  function connect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}/ws/chat`);

    ws.onopen = () => {
      setStatus('connected', 'Connected');
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    };

    ws.onclose = (ev) => {
      setStatus('connecting', ev.wasClean ? 'Disconnected' : 'Reconnecting…');
      inputEl.disabled = true;
      sendBtn.disabled = true;
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      setStatus('error', 'Connection error');
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      handleServerMessage(msg);
    };
  }

  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }

  // ── Server message handler ────────────────────────────────────────────────
  function handleServerMessage(msg) {
    switch (msg.type) {
      case 'init':
        modelLabel.textContent = `${msg.provider} / ${msg.model}`;
        renderSkills(msg.skills || []);
        break;

      case 'chunk':
        // Streaming: append content to the in-progress assistant bubble
        if (!currentBubble) {
          removeTypingIndicator();
          currentBubble = createAssistantBubble();
          currentBubbleText = '';
        }
        currentBubbleText += msg.content;
        currentBubble.innerHTML = marked.parse(currentBubbleText);
        addCopyButtons(currentBubble);
        scrollToBottom();
        break;

      case 'done':
        removeTypingIndicator();
        const finalText = msg.content || currentBubbleText;
        if (currentBubble) {
          currentBubble.innerHTML = marked.parse(finalText);
          addCopyButtons(currentBubble);
          hljs.highlightAll();
          currentBubble = null;
          currentBubbleText = '';
        } else {
          // Non-streaming: single payload
          const bubble = createAssistantBubble();
          bubble.innerHTML = marked.parse(finalText);
          addCopyButtons(bubble);
          hljs.highlightAll();
        }
        setReady();
        scrollToBottom();
        break;

      case 'error':
        removeTypingIndicator();
        currentBubble = null;
        currentBubbleText = '';
        showError(msg.message || 'Unknown error');
        setReady();
        break;
    }
  }

  // ── Send message ──────────────────────────────────────────────────────────
  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isWaiting || !ws || ws.readyState !== WebSocket.OPEN) return;

    welcomeEl.style.display = 'none';
    addUserBubble(text);
    addTypingIndicator();

    ws.send(JSON.stringify({ message: text }));

    inputEl.value = '';
    inputEl.style.height = 'auto';
    isWaiting = true;
    inputEl.disabled = true;
    sendBtn.disabled = true;
    scrollToBottom();
  }

  function setReady() {
    isWaiting = false;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function addUserBubble(text) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `
      <div class="avatar">👤</div>
      <div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
    `;
    messagesEl.appendChild(div);
  }

  function createAssistantBubble() {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    div.innerHTML = `<div class="avatar">🧠</div>`;
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    return bubble;
  }

  function addTypingIndicator() {
    removeTypingIndicator();
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar">🧠</div>
      <div class="bubble">
        <div class="typing-indicator">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    `;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function showError(message) {
    errorBanner.textContent = '⚠  ' + message;
    errorBanner.style.display = 'block';
    setTimeout(() => { errorBanner.style.display = 'none'; }, 9000);
  }

  // ── Skills sidebar ────────────────────────────────────────────────────────
  function renderSkills(skills) {
    if (!skills.length) {
      skillListEl.innerHTML =
        '<div style="padding:14px 16px;color:var(--text-muted);font-size:12px;">No skills loaded</div>';
      return;
    }
    // Use data attributes + event delegation — never put skill names in onclick
    // attributes, as that would allow XSS if a skill name contained JS characters.
    skillListEl.innerHTML = skills.map(s => `
      <div class="skill-item" title="${esc(s.description || '')}"
           data-skill-name="${esc(s.name)}">
        <div class="skill-name">${esc(s.name)}</div>
        <div class="skill-desc">${esc((s.description || '').split('.')[0])}</div>
      </div>
    `).join('');
  }

  // Single event listener on the container handles all skill-item clicks
  skillListEl.addEventListener('click', (e) => {
    const item = e.target.closest('.skill-item');
    if (!item) return;
    const skillName = item.dataset.skillName;
    if (skillName) prefillSkill(skillName);
  });

  // Escape for use inside HTML attribute strings
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function prefillSkill(skillName) {
    if (inputEl.disabled) return;
    const current = inputEl.value.trim();
    inputEl.value = current ? `${current} using ${skillName}` : `Use the ${skillName} skill to `;
    inputEl.focus();
    // move cursor to end
    inputEl.selectionStart = inputEl.selectionEnd = inputEl.value.length;
  }

  // ── Copy buttons for code blocks ──────────────────────────────────────────
  function addCopyButtons(bubble) {
    bubble.querySelectorAll('pre').forEach(pre => {
      if (pre.querySelector('.copy-btn')) return;  // already added
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', () => {
        const code = pre.querySelector('code');
        const text = code ? code.textContent : pre.textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
        }).catch(() => {
          btn.textContent = 'Failed';
          setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
        });
      });
      pre.appendChild(btn);
    });
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
