<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroClaw</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --radius-lg: 16px;
      --radius-md: 12px;
      --header-h: 64px;
      --sidebar-w: 320px;
      --shadow-soft: 0 8px 30px rgba(15, 23, 42, 0.08);
      --shadow-card: 0 2px 8px rgba(15, 23, 42, 0.08);
      --ease: 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    html[data-theme="light"] {
      --bg: #e9edf3;
      --bg-grad-a: #f8fafc;
      --bg-grad-b: #dde5ee;
      --surface: #f7f9fc;
      --surface-elev: #ffffff;
      --surface-soft: #edf2f8;
      --border: #d8e1eb;
      --accent: #0a84ff;
      --text: #152135;
      --text-muted: #5e6a7d;
      --danger: #d92d20;
      --ok: #23a55a;
      --user-bg: #0a84ff;
      --user-text: #ffffff;
    }

    html[data-theme="dark"] {
      --bg: #0e141c;
      --bg-grad-a: #161d27;
      --bg-grad-b: #0d1218;
      --surface: #171f2a;
      --surface-elev: #1d2734;
      --surface-soft: #243243;
      --border: #2b3a4b;
      --accent: #58a6ff;
      --text: #d7e0ea;
      --text-muted: #8da0b4;
      --danger: #f85149;
      --ok: #3fb950;
      --user-bg: #2f81f7;
      --user-text: #ffffff;
      --shadow-soft: 0 10px 34px rgba(0, 0, 0, 0.45);
      --shadow-card: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    html, body {
      height: 100%;
      font-family: "SF Pro Text", "SF Pro Display", "Helvetica Neue", "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 500px at 10% -10%, var(--bg-grad-a), transparent 70%),
        radial-gradient(1200px 500px at 95% 105%, var(--bg-grad-b), transparent 72%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #app { height: 100vh; display: flex; flex-direction: column; }

    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in oklab, var(--surface), transparent 8%);
      backdrop-filter: saturate(140%) blur(10px);
      flex-shrink: 0;
      z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: var(--shadow-card);
      background: var(--surface-elev);
      border: 1px solid var(--border);
    }
    .brand-name { font-size: 18px; font-weight: 650; letter-spacing: .01em; white-space: nowrap; }

    .model-badge {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 11px;
    }
    .model-select {
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      outline: none;
      min-width: 180px;
      cursor: pointer;
    }

    .spacer { flex: 1; }

    .theme-switch {
      display: inline-flex;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      padding: 3px;
      gap: 3px;
    }
    .theme-btn {
      border: none;
      background: transparent;
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--ease);
    }
    .theme-btn.active { background: var(--surface-elev); color: var(--text); box-shadow: var(--shadow-card); }

    .status { display: flex; align-items: center; gap: 7px; color: var(--text-muted); font-size: 12px; min-width: 94px; justify-content: flex-end; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    .status-dot.connected { background: var(--ok); }
    .status-dot.error { background: var(--danger); }

    #error-banner {
      display: none;
      background: color-mix(in oklab, var(--danger), transparent 88%);
      border-bottom: 1px solid color-mix(in oklab, var(--danger), transparent 35%);
      color: var(--danger);
      font-size: 13px;
      padding: 8px 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .main { flex: 1; min-height: 0; display: flex; gap: 12px; padding: 12px; }

    .sidebar {
      width: var(--sidebar-w);
      background: color-mix(in oklab, var(--surface), transparent 7%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .nav-section { border-bottom: 1px solid var(--border); min-height: 48px; display: flex; flex-direction: column; min-height: 0; }
    #chat-section { flex: 0 0 auto; }
    #skills-section { flex: 1 1 auto; }
    .nav-section:last-child { border-bottom: none; }

    .nav-toggle {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .nav-toggle:hover { background: var(--surface-soft); }
    .nav-toggle .caret { color: var(--text-muted); transition: transform var(--ease); font-size: 14px; }
    .nav-section.collapsed .caret { transform: rotate(-90deg); }

    .section-body { max-height: 50vh; overflow: hidden; transition: max-height var(--ease); }
    #skills-section .section-body { max-height: none; flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .nav-section.collapsed .section-body { max-height: 0; }
    #skills-section.collapsed .section-body { max-height: 0; flex: 0 0 auto; }

    .chat-actions {
      padding: 0 12px 10px;
      display: flex;
      flex-direction: row;
      gap: 8px;
    }
    .new-chat-btn {
      width: auto;
      flex: 1 1 0;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--ease);
    }
    .new-chat-btn:hover { border-color: color-mix(in oklab, var(--accent), var(--border) 65%); transform: translateY(-1px); }
    .clear-chat-btn {
      width: auto;
      flex: 1 1 0;
      border: 1px solid color-mix(in oklab, #d64545, var(--border) 40%);
      background: color-mix(in oklab, #d64545, transparent 92%);
      color: color-mix(in oklab, #d64545, var(--text) 22%);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--ease);
    }
    .clear-chat-btn:hover { border-color: color-mix(in oklab, #d64545, var(--border) 20%); transform: translateY(-1px); }

    .chat-list, .skill-list {
      list-style: none;
      margin: 0;
      padding: 0 8px 10px;
      max-height: calc(50vh - 48px);
      overflow-y: auto;
    }
    .skill-list { flex: 1; max-height: none; min-height: 0; }

    .chat-item, .skill-item {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 10px;
      margin-bottom: 4px;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      transition: all var(--ease);
      color: var(--text);
    }
    .chat-item:hover, .skill-item:hover { background: var(--surface-soft); border-color: var(--border); }
    .chat-item.active { background: color-mix(in oklab, var(--accent), transparent 88%); border-color: color-mix(in oklab, var(--accent), var(--border) 50%); }
    .skill-item.active { background: color-mix(in oklab, var(--accent), transparent 90%); border-color: color-mix(in oklab, var(--accent), var(--border) 58%); }

    .chat-row { display: flex; align-items: center; gap: 8px; }
    .chat-title { flex: 1; min-width: 0; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-meta { margin-top: 3px; font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .rename-btn {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      flex-shrink: 0;
      transition: all var(--ease);
    }
    .rename-btn:hover { background: var(--surface-elev); color: var(--text); }

    .chat-menu-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .chat-menu-btn {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 17px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      transition: all var(--ease);
    }
    .chat-menu-btn:hover { background: var(--surface-elev); color: var(--text); }

    .chat-menu {
      position: fixed;
      z-index: 9999;
      min-width: 128px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      box-shadow: var(--shadow-card);
      padding: 4px;
      display: none;
    }

    .chat-menu.open { display: block; }

    .chat-menu-item {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 7px 9px;
      text-align: left;
      font-size: 12px;
      color: var(--text);
      background: transparent;
      cursor: pointer;
    }
    .chat-menu-item:hover { background: var(--surface-soft); }

    .skill-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
    }
    .skill-name {
      flex: 1;
      min-width: 0;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .skill-info-btn {
      border: none;
      background: var(--surface-elev);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 22px;
      height: 22px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      transition: all var(--ease);
    }
    .skill-info-btn:hover {
      color: var(--text);
      border-color: color-mix(in oklab, var(--accent), var(--border) 55%);
    }

    .skill-info-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 12, 20, 0.32);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 16px;
    }
    .skill-info-overlay.open { display: flex; }

    .skill-info-card {
      width: min(420px, 92vw);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-elev);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }
    .skill-info-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in oklab, var(--surface-soft), var(--surface-elev) 38%);
    }
    .skill-info-title {
      font-size: 15px;
      font-weight: 700;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .skill-info-close {
      border: none;
      background: transparent;
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .skill-info-close:hover { background: var(--surface-soft); color: var(--text); }
    .skill-info-body {
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
    }
    .skill-info-caption {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .avatar-picker-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }
    .avatar-option {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 6px;
      background: var(--surface-elev);
      cursor: pointer;
      text-align: center;
      transition: all var(--ease);
    }
    .avatar-option:hover { border-color: color-mix(in oklab, var(--accent), var(--border) 60%); }
    .avatar-option.active {
      border-color: var(--accent);
      background: color-mix(in oklab, var(--accent), transparent 92%);
    }
    .avatar-option img {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      object-fit: cover;
      display: block;
      margin: 0 auto 6px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .avatar-option-name {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: color-mix(in oklab, var(--surface), transparent 7%);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    #messages { flex: 1; min-height: 0; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 14px; }

    #welcome { margin: auto; text-align: center; max-width: 520px; padding: 20px; color: var(--text-muted); }
    .welcome-logo {
      width: 82px;
      height: 82px;
      border-radius: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
      object-fit: cover;
      background: var(--surface-elev);
    }
    #welcome h2 { color: var(--text); font-size: 27px; letter-spacing: -0.02em; margin-bottom: 10px; }
    #welcome p { line-height: 1.7; font-size: 14px; }

    .msg { display: flex; gap: 10px; align-items: flex-end; animation: riseIn 220ms ease-out; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes riseIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .avatar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      min-width: 34px;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      color: var(--text-muted);
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .msg.user .avatar { border-color: color-mix(in oklab, var(--accent), var(--border) 60%); color: var(--accent); }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1;
      white-space: nowrap;
      opacity: .9;
    }

    .avatar-btn {
      border: 1px solid color-mix(in oklab, var(--accent), var(--border) 60%);
      background: var(--surface-elev);
      cursor: pointer;
      transition: transform var(--ease), border-color var(--ease);
      padding: 0;
    }
    .avatar-btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .msg-main {
      max-width: min(760px, calc(100% - 84px));
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .msg.user .msg-main { align-items: flex-end; }
    .msg.assistant .msg-main { align-items: flex-start; }

    .bubble {
      max-width: 100%;
      width: fit-content;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      padding: 11px 14px;
      font-size: 14px;
      line-height: 1.62;
      overflow-x: auto;
      word-break: break-word;
      position: relative;
    }
    .msg.user .bubble { background: var(--user-bg); color: var(--user-text); border-color: transparent; border-bottom-right-radius: 7px; }
    .msg.assistant .bubble { border-bottom-left-radius: 7px; }

    .msg-actions {
      position: static;
      display: inline-flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
      min-height: 30px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity var(--ease);
    }
    .msg.user .msg-actions { justify-content: flex-end; align-self: flex-end; }
    .msg.assistant .msg-actions { justify-content: flex-start; align-self: flex-start; }
    .msg:hover .msg-actions,
    .msg.editing .msg-actions {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .msg-action-btn {
      border: 1px solid var(--border);
      background: var(--surface-elev);
      color: var(--text-muted);
      border-radius: 8px;
      width: 32px;
      height: 28px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }
    .msg-action-btn:hover { color: var(--text); border-color: color-mix(in oklab, var(--accent), var(--border) 55%); }
    .msg-action-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: block;
    }
    .msg-action-btn::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 6px);
      transform: translateX(-50%);
      font-size: 11px;
      line-height: 1;
      color: #fff;
      background: rgba(20, 24, 32, 0.95);
      border-radius: 6px;
      padding: 4px 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--ease);
    }
    .msg-action-btn:hover::after { opacity: 1; }

    .msg.user .msg-action-btn {
      background: color-mix(in oklab, #ffffff, transparent 12%);
      color: #1f3b62;
      border-color: color-mix(in oklab, #ffffff, transparent 35%);
    }

    .edit-textarea {
      width: 100%;
      min-height: 96px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      color: var(--text);
      padding: 10px 12px 34px;
      font-size: 14px;
      line-height: 1.45;
      resize: vertical;
      outline: none;
    }

    .msg.user .edit-textarea {
      background: #ffffff;
      color: #18253a;
      border-color: color-mix(in oklab, #ffffff, transparent 40%);
    }

    .bubble p { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 8px 0; }
    .bubble li { margin: 2px 0; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 9px 0 4px; }
    .bubble pre {
      margin: 8px 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      position: relative;
      background: color-mix(in oklab, var(--surface-soft), var(--surface-elev) 30%);
    }
    .bubble code {
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12.5px;
    }
    .bubble :not(pre) > code { border-radius: 6px; border: 1px solid var(--border); background: var(--surface-soft); padding: 1px 5px; }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      color: var(--text-muted);
      border-radius: 8px;
      font-size: 11px;
      padding: 4px 7px;
      cursor: pointer;
      opacity: 0;
      transition: all var(--ease);
    }
    pre:hover .copy-btn { opacity: 1; }

    .typing-indicator { display: flex; gap: 4px; }
    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: dotPulse 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes dotPulse { 0%, 70%, 100% { transform: translateY(0); opacity: .5; } 35% { transform: translateY(-4px); opacity: 1; } }

    .exec-live {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .exec-live-title {
      font-size: 13px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }
    .exec-live-time {
      font-size: 11px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .attach-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 0; }
    .attach-list:empty { display: none; }

    .attach-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 8px;
      background: var(--surface-elev);
      font-size: 12px;
      color: var(--text);
      max-width: 300px;
    }
    .skill-chip { background: color-mix(in oklab, var(--accent), transparent 90%); border-color: color-mix(in oklab, var(--accent), var(--border) 56%); }
    .attach-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .attach-remove {
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      width: 20px;
      height: 20px;
      font-size: 14px;
      line-height: 1;
    }
    .attach-remove:hover { background: var(--surface-soft); color: var(--text); }

    .input-row { display: flex; align-items: flex-end; gap: 10px; }

    .upload-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 17px;
      flex-shrink: 0;
      transition: all var(--ease);
    }
    .upload-btn:hover { color: var(--text); border-color: color-mix(in oklab, var(--accent), var(--border) 60%); transform: translateY(-1px); }

    #msg-input {
      flex: 1;
      min-height: 44px;
      max-height: 180px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-elev);
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
      resize: none;
      outline: none;
      transition: border-color var(--ease);
    }
    #msg-input:focus { border-color: color-mix(in oklab, var(--accent), var(--border) 40%); }
    #msg-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      font-size: 17px;
      transition: transform var(--ease), opacity var(--ease);
      flex-shrink: 0;
    }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }
    #send-btn:not(:disabled):hover { transform: translateY(-1px); }

    .empty-hint { font-size: 12px; color: var(--text-muted); padding: 10px 12px 14px; }

    @media (max-width: 1024px) {
      :root { --sidebar-w: 280px; }
      .main { gap: 10px; padding: 10px; }
    }

    @media (max-width: 780px) {
      .main { flex-direction: column; }
      .sidebar { width: 100%; max-height: 42vh; }
      .chat-panel { min-height: 50vh; }
    }

    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--text-muted), transparent 35%); border-radius: 999px; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <img class="brand-logo" src="/materials/logo.png" alt="NeuroClaw logo">
      <div class="brand-name">NeuroClaw</div>
    </div>
    <div class="model-badge">
      <span id="model-label">Model</span>
      <select id="model-select" class="model-select" aria-label="Select model">
        <option value="">Loading model...</option>
      </select>
    </div>
    <div class="spacer"></div>
    <div class="theme-switch" role="tablist" aria-label="Theme switcher">
      <button class="theme-btn" data-theme="light" type="button">Day</button>
      <button class="theme-btn" data-theme="dark" type="button">Night</button>
    </div>
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </header>

  <div id="error-banner"></div>

  <div class="main">
    <aside class="sidebar">
      <section class="nav-section" id="chat-section">
        <button class="nav-toggle" data-target="chat" type="button">
          <span>Chat</span><span class="caret">▾</span>
        </button>
        <div class="section-body">
          <div class="chat-actions">
            <button class="new-chat-btn" id="new-chat-btn" type="button">+ New Chat</button>
            <button class="clear-chat-btn" id="clear-chat-btn" type="button">Clear All Chats</button>
          </div>
          <ul class="chat-list" id="chat-list"></ul>
          <div class="empty-hint" id="chat-empty-hint" style="display:none;">No sessions yet, creating one automatically...</div>
        </div>
      </section>

      <section class="nav-section" id="skills-section">
        <button class="nav-toggle" data-target="skills" type="button">
          <span>Skills</span><span class="caret">▾</span>
        </button>
        <div class="section-body">
          <ul class="skill-list" id="skill-list"><li class="empty-hint">Loading skills...</li></ul>
        </div>
      </section>
    </aside>

    <div class="chat-panel">
      <div id="messages">
        <div id="welcome">
          <img class="welcome-logo" src="/materials/logo.png" alt="NeuroClaw logo">
          <h2>Welcome to NeuroClaw</h2>
          <p>Click skills on the left to pin them as context chips, then send your message.</p>
        </div>
      </div>

      <div class="input-area">
        <div class="attach-list" id="attach-list"></div>
        <div class="input-row">
          <input id="file-input" type="file" accept=".txt,.md,.markdown,.json,.yaml,.yml,.csv,.tsv,.py,.js,.ts,.tsx,.jsx,.sh,.bash,.zsh,.sql,.html,.css,.xml,.log,.rst,.ini,.toml,.cfg,.pdf,.docx,.xlsx,.pptx" multiple hidden>
          <button id="upload-btn" class="upload-btn" title="Upload supported files" type="button">📎</button>
          <textarea id="msg-input" rows="1" placeholder="Ask NeuroClaw... (Enter to send, Shift+Enter for newline)"></textarea>
          <button id="send-btn" title="Send" type="button">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="skill-info-overlay" id="skill-info-overlay" aria-hidden="true">
  <div class="skill-info-card" role="dialog" aria-modal="true" aria-labelledby="skill-info-title">
    <div class="skill-info-head">
      <div class="skill-info-title" id="skill-info-title">Skill</div>
      <button class="skill-info-close" id="skill-info-close" type="button" aria-label="Close">×</button>
    </div>
    <div class="skill-info-body" id="skill-info-body"></div>
  </div>
</div>

<div class="skill-info-overlay" id="avatar-picker-overlay" aria-hidden="true">
  <div class="skill-info-card" role="dialog" aria-modal="true" aria-labelledby="avatar-picker-title">
    <div class="skill-info-head">
      <div class="skill-info-title" id="avatar-picker-title">选择用户头像 / Choose User Avatar</div>
      <button class="skill-info-close" id="avatar-picker-close" type="button" aria-label="Close">×</button>
    </div>
    <div class="avatar-picker-grid" id="avatar-picker-grid"></div>
  </div>
</div>

<script>
  function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function fallbackMarkdown(text) {
    let html = escapeHtml(String(text || ''));
    html = html.replace(/```([\w]*)\n([\s\S]*?)```/g, (_m, lang, code) => `<pre><code class="hljs ${escapeHtml(lang)}">${escapeHtml(code.trim())}</code></pre>`);
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
    html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    return html.replace(/\n/g, '<br>');
  }

  if (typeof window.marked !== 'undefined' && window.marked.setOptions) {
    try {
      window.marked.setOptions({
        breaks: true,
        gfm: true,
        highlight: function(code, lang) {
          if (typeof window.hljs !== 'undefined' && window.hljs.highlight) {
            try {
              if (lang && window.hljs.getLanguage && window.hljs.getLanguage(lang)) {
                return window.hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
              }
              return window.hljs.highlightAuto(code).value;
            } catch (_e) {
              return escapeHtml(code);
            }
          }
          return escapeHtml(code);
        },
      });
    } catch (_e) {}
  }

  if (typeof window.marked === 'undefined') {
    window.marked = { parse: fallbackMarkdown, setOptions: function() {} };
  }
  if (typeof window.hljs === 'undefined') {
    window.hljs = {
      getLanguage: function() { return false; },
      highlight: function(code) { return { value: escapeHtml(code) }; },
      highlightAuto: function(code) { return { value: escapeHtml(code) }; },
      highlightAll: function() {},
    };
  }

  const messagesEl = document.getElementById('messages');
  const welcomeEl = document.getElementById('welcome');
  const inputEl = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const modelLabel = document.getElementById('model-label');
  const modelSelect = document.getElementById('model-select');
  const errorBanner = document.getElementById('error-banner');
  const chatListEl = document.getElementById('chat-list');
  const skillListEl = document.getElementById('skill-list');
  const chatEmptyHintEl = document.getElementById('chat-empty-hint');
  const newChatBtn = document.getElementById('new-chat-btn');
  const clearChatBtn = document.getElementById('clear-chat-btn');
  const fileInputEl = document.getElementById('file-input');
  const uploadBtnEl = document.getElementById('upload-btn');
  const attachListEl = document.getElementById('attach-list');
  const skillInfoOverlayEl = document.getElementById('skill-info-overlay');
  const skillInfoTitleEl = document.getElementById('skill-info-title');
  const skillInfoBodyEl = document.getElementById('skill-info-body');
  const skillInfoCloseEl = document.getElementById('skill-info-close');
  const avatarPickerOverlayEl = document.getElementById('avatar-picker-overlay');
  const avatarPickerCloseEl = document.getElementById('avatar-picker-close');
  const avatarPickerGridEl = document.getElementById('avatar-picker-grid');

  const SESSION_KEY = 'neuroclaw.web.sessions.v1';
  const PREF_KEY = 'neuroclaw.web.prefs.v1';
  const MAX_ATTACHMENT_FILE_BYTES = 15 * 1024 * 1024;
  const MAX_EMBED_CHARS = 12000;
  const SUPPORTED_ATTACHMENT_EXTENSIONS = [
    '.txt', '.md', '.markdown', '.json', '.yaml', '.yml', '.csv', '.tsv',
    '.py', '.js', '.ts', '.tsx', '.jsx', '.sh', '.bash', '.zsh', '.sql',
    '.html', '.css', '.xml', '.log', '.rst', '.ini', '.toml', '.cfg',
    '.pdf', '.docx', '.xlsx', '.pptx',
  ];
  const SHELL_STATUS_POLL_MS = 1000;

  const state = {
    sessions: [],
    skills: [],
    activeSessionId: null,
    waiting: false,
    pendingFiles: [],
    selectedSkills: [],
    skillSummaryCache: {},
    editingMessageId: null,
    openSessionMenuId: null,
    menuPosition: null,
    userAvatarId: 'brainy',
    expanded: { chat: true, skills: true },
    theme: 'light',
    execution: {
      active: false,
      text: '',
      startedAt: 0,
      sessionId: null,
      poller: null,
    },
    requestController: null,
    availableModels: [],
  };

  const ASSISTANT_AVATAR_SRC = '/materials/logo.png';
  const USER_AVATAR_OPTIONS = [
    { id: 'brainy', name: 'Brainy', emoji: '🧠', bg: '#d9ecff' },
    { id: 'cat', name: 'Cat', emoji: '🐱', bg: '#ffe7c4' },
    { id: 'fox', name: 'Fox', emoji: '🦊', bg: '#ffe0d2' },
    { id: 'robot', name: 'Robot', emoji: '🤖', bg: '#d6f3ee' },
    { id: 'panda', name: 'Panda', emoji: '🐼', bg: '#f0f1f5' },
    { id: 'otter', name: 'Otter', emoji: '🦦', bg: '#efe2d4' },
    { id: 'owl', name: 'Owl', emoji: '🦉', bg: '#e8e3ff' },
    { id: 'frog', name: 'Frog', emoji: '🐸', bg: '#dcf6d7' },
  ];

  function makeAvatarDataUri(emoji, bg) {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72"><circle cx="36" cy="36" r="35" fill="${bg}"/><text x="36" y="45" text-anchor="middle" font-size="34">${emoji}</text></svg>`;
    return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
  }

  function getUserAvatarSrcById(id) {
    const item = USER_AVATAR_OPTIONS.find(o => o.id === id) || USER_AVATAR_OPTIONS[0];
    return makeAvatarDataUri(item.emoji, item.bg);
  }

  function nowISO() { return new Date().toISOString(); }

  function newMessageId() {
    return 'msg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  }

  function showError(message) {
    errorBanner.textContent = '⚠ ' + message;
    errorBanner.style.display = 'block';
    setTimeout(() => { errorBanner.style.display = 'none'; }, 6000);
  }

  function setStatus(kind, text) {
    statusDot.className = 'status-dot ' + kind;
    statusText.textContent = text;
  }

  function renderModelOptions(selectedProvider, selectedModel) {
    const items = Array.isArray(state.availableModels) ? state.availableModels : [];
    modelSelect.innerHTML = '';
    if (!items.length) {
      const option = document.createElement('option');
      option.value = '';
      option.textContent = 'Model unavailable';
      modelSelect.appendChild(option);
      modelSelect.disabled = true;
      return;
    }

    items.forEach(item => {
      const option = document.createElement('option');
      option.value = JSON.stringify({ provider: item.provider, model: item.model });
      option.textContent = item.label || `${item.provider} / ${item.model}`;
      option.selected = item.provider === selectedProvider && item.model === selectedModel;
      modelSelect.appendChild(option);
    });
    modelSelect.disabled = false;
  }

  async function switchModel(provider, model) {
    const resp = await fetch('/api/env/model', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, model }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      throw new Error(data.message || 'Unable to switch model');
    }
    state.availableModels = Array.isArray(data.available_models) ? data.available_models : state.availableModels;
    renderModelOptions(data.provider, data.model);
    setStatus('connected', `Ready · ${data.provider} / ${data.model}`);
  }

  function setSendButtonMode(mode) {
    const busy = mode === 'stop';
    sendBtn.textContent = busy ? '⏹' : '➤';
    sendBtn.title = busy ? 'Stop' : 'Send';
    sendBtn.setAttribute('aria-label', busy ? 'Stop request' : 'Send message');
    sendBtn.classList.toggle('stop-mode', busy);
  }

  function formatDuration(ms) {
    const totalSeconds = Math.max(0, Math.floor(ms / 1000));
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  }

  function applyShellStatus(status) {
    const wasActive = state.execution.active;

    if (!status || !status.active) {
      state.execution.active = false;
      state.execution.text = '';
      state.execution.startedAt = 0;
      state.execution.sessionId = null;
      syncExecutionIndicatorVisibility();
      return;
    }

    const newCommand = String(status.command || '').trim();
    if (newCommand) state.execution.text = newCommand;

    if (!wasActive) {
      state.execution.sessionId = state.activeSessionId || null;
    }

    state.execution.active = true;
    state.execution.startedAt = Number(status.started_at || Date.now());
    syncExecutionIndicatorVisibility();
  }

  async function refreshShellStatus() {
    try {
      const resp = await fetch('/api/shell/status');
      const data = await resp.json();
      applyShellStatus(data);
    } catch (_e) {
      applyShellStatus(null);
    }
  }

  function startShellStatusPolling() {
    refreshShellStatus();
    if (state.execution.poller) clearInterval(state.execution.poller);
    state.execution.poller = setInterval(refreshShellStatus, SHELL_STATUS_POLL_MS);
  }

  function saveSessions() {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ sessions: state.sessions, activeSessionId: state.activeSessionId }));
  }

  function savePrefs() {
    localStorage.setItem(PREF_KEY, JSON.stringify({ expanded: state.expanded, theme: state.theme, userAvatarId: state.userAvatarId }));
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state.sessions = Array.isArray(parsed.sessions) ? parsed.sessions : [];
        state.activeSessionId = parsed.activeSessionId || null;
      }
    } catch (_e) {}

    try {
      const raw = localStorage.getItem(PREF_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.expanded) {
          state.expanded.chat = parsed.expanded.chat !== false;
          state.expanded.skills = parsed.expanded.skills !== false;
        }
        if (parsed && (parsed.theme === 'light' || parsed.theme === 'dark')) {
          state.theme = parsed.theme;
        }
        if (parsed && typeof parsed.userAvatarId === 'string') {
          state.userAvatarId = parsed.userAvatarId;
        }
      }
    } catch (_e) {}
  }

  function renderAvatarPicker() {
    avatarPickerGridEl.innerHTML = USER_AVATAR_OPTIONS.map(opt => `
      <button class="avatar-option ${state.userAvatarId === opt.id ? 'active' : ''}" data-avatar-id="${escapeHtml(opt.id)}" type="button" title="${escapeHtml(opt.name)}">
        <img src="${makeAvatarDataUri(opt.emoji, opt.bg)}" alt="${escapeHtml(opt.name)}">
        <div class="avatar-option-name">${escapeHtml(opt.name)}</div>
      </button>
    `).join('');
  }

  function openAvatarPicker() {
    renderAvatarPicker();
    avatarPickerOverlayEl.classList.add('open');
    avatarPickerOverlayEl.setAttribute('aria-hidden', 'false');
  }

  function closeAvatarPicker() {
    avatarPickerOverlayEl.classList.remove('open');
    avatarPickerOverlayEl.setAttribute('aria-hidden', 'true');
  }

  function createSession(title) {
    const id = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    const s = { id, title: title || 'New Chat', createdAt: nowISO(), updatedAt: nowISO(), messages: [] };
    state.sessions.unshift(s);
    state.activeSessionId = id;
    saveSessions();
    renderChatList();
    renderActiveSession();
    return s;
  }

  function ensureSession() {
    if (!state.sessions.length) {
      chatEmptyHintEl.style.display = 'block';
      createSession('New Chat');
      chatEmptyHintEl.style.display = 'none';
      return;
    }
    if (!state.sessions.some(s => s.id === state.activeSessionId)) {
      state.activeSessionId = state.sessions[0].id;
      saveSessions();
    }
  }

  function getActiveSession() {
    return state.sessions.find(s => s.id === state.activeSessionId) || null;
  }

  function setActiveSession(sessionId) {
    state.activeSessionId = sessionId;
    state.openSessionMenuId = null;
    state.menuPosition = null;
    saveSessions();
    renderChatList();
    renderActiveSession();
  }

  function renameSession(sessionId) {
    const s = state.sessions.find(x => x.id === sessionId);
    if (!s) return;
    const next = prompt('Rename chat title', s.title || 'New Chat');
    if (next === null) return;
    const val = next.trim();
    if (!val) return;
    s.title = val.slice(0, 64);
    s.updatedAt = nowISO();
    state.sessions.sort((a, b) => (a.updatedAt < b.updatedAt ? 1 : -1));
    saveSessions();
    renderChatList();
  }

  function deleteSession(sessionId) {
    const idx = state.sessions.findIndex(s => s.id === sessionId);
    if (idx < 0) return;
    const session = state.sessions[idx];
    const ok = confirm(`Delete chat \"${session.title}\"? This cannot be undone.`);
    if (!ok) return;

    state.sessions.splice(idx, 1);
    if (!state.sessions.length) {
      createSession('New Chat');
      return;
    }

    if (state.activeSessionId === sessionId) {
      state.activeSessionId = state.sessions[0].id;
    }
    state.openSessionMenuId = null;
    state.menuPosition = null;
    saveSessions();
    renderChatList();
    renderActiveSession();
  }

  function clearAllSessions() {
    if (!state.sessions.length) return;
    const ok = confirm('Clear all chat history? This cannot be undone.');
    if (!ok) return;

    state.sessions = [];
    state.activeSessionId = null;
    state.openSessionMenuId = null;
    state.menuPosition = null;
    state.editingMessageId = null;
    state.selectedSkills = [];
    clearPendingFiles();
    removeTypingIndicator();

    createSession('New Chat');
    renderSkills(state.skills);
    renderPendingFiles();
    inputEl.focus();
  }

  function downloadTextFile(filename, content, mimeType) {
    const blob = new Blob([content], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function safeFilename(name) {
    return String(name || 'chat').replace(/[^a-zA-Z0-9_-]+/g, '_').slice(0, 60) || 'chat';
  }

  function sessionToMarkdown(session) {
    const lines = [
      `# ${session.title}`,
      '',
      `- Exported: ${new Date().toISOString()}`,
      `- Created: ${session.createdAt}`,
      `- Updated: ${session.updatedAt}`,
      '',
      '---',
      '',
    ];

    for (const msg of session.messages) {
      const role = msg.role === 'assistant' ? 'Assistant' : 'User';
      lines.push(`## ${role}`);
      lines.push('');
      lines.push(String(msg.content || ''));
      lines.push('');
    }
    return lines.join('\n');
  }

  function exportSession(sessionId) {
    const session = state.sessions.find(s => s.id === sessionId);
    if (!session) return;

    const fmt = prompt('Export format: json or md', 'json');
    if (fmt === null) return;
    const format = fmt.trim().toLowerCase();
    const base = `${safeFilename(session.title)}_${session.id}`;

    if (format === 'md' || format === 'markdown') {
      downloadTextFile(`${base}.md`, sessionToMarkdown(session), 'text/markdown;charset=utf-8');
      return;
    }

    const payload = {
      id: session.id,
      title: session.title,
      createdAt: session.createdAt,
      updatedAt: session.updatedAt,
      messages: session.messages.map(m => ({ role: m.role, content: m.content })),
    };
    downloadTextFile(`${base}.json`, JSON.stringify(payload, null, 2), 'application/json;charset=utf-8');
  }

  function renderChatList() {
    if (!state.sessions.length) {
      chatListEl.innerHTML = '';
      return;
    }

    function formatCreatedAt(iso) {
      try {
        return new Date(iso).toLocaleString();
      } catch (_e) {
        return String(iso || 'Unknown');
      }
    }

    chatListEl.innerHTML = state.sessions.map(s => {
      const createdLabel = `Created: ${formatCreatedAt(s.createdAt)}`;
      return `
        <li>
          <div class="chat-item ${s.id === state.activeSessionId ? 'active' : ''}" data-session-id="${escapeHtml(s.id)}" role="button" tabindex="0">
            <div class="chat-row">
              <div class="chat-title" title="${escapeHtml(s.title)}">${escapeHtml(s.title)}</div>
              <span class="chat-menu-wrap">
                <button class="chat-menu-btn" data-menu-toggle-id="${escapeHtml(s.id)}" type="button" title="Session menu">⋮</button>
                <span class="chat-menu ${state.openSessionMenuId === s.id ? 'open' : ''}" ${state.openSessionMenuId === s.id && state.menuPosition ? `style="top:${state.menuPosition.top}px;left:${state.menuPosition.left}px;"` : ''}>
                  <button class="chat-menu-item" data-menu-action="export" data-menu-id="${escapeHtml(s.id)}" type="button">Export</button>
                  <button class="chat-menu-item" data-menu-action="rename" data-menu-id="${escapeHtml(s.id)}" type="button">Rename</button>
                  <button class="chat-menu-item" data-menu-action="delete" data-menu-id="${escapeHtml(s.id)}" type="button">Delete</button>
                </span>
              </span>
            </div>
            <div class="chat-meta" title="${escapeHtml(createdLabel)}">${escapeHtml(createdLabel)}</div>
          </div>
        </li>
      `;
    }).join('');
  }

  function renderSkills(skills) {
    state.skills = skills;
    if (!skills.length) {
      skillListEl.innerHTML = '<li class="empty-hint">No skills loaded</li>';
      return;
    }
    skillListEl.innerHTML = skills.map(s => {
      const desc = String(s.description || '');
      const active = state.selectedSkills.includes(s.name);
      return `
        <li>
          <div class="skill-item ${active ? 'active' : ''}" data-skill-name="${escapeHtml(s.name)}" role="button" tabindex="0" title="${escapeHtml(desc)}">
            <div class="skill-row">
              <div class="skill-name">${escapeHtml(s.name)}</div>
              <button class="skill-info-btn" data-skill-info="${escapeHtml(s.name)}" type="button" title="Skill info" aria-label="Skill info">i</button>
            </div>
          </div>
        </li>
      `;

  function openSkillInfo(skillName) {
    const skill = state.skills.find(s => s.name === skillName) || { name: skillName, description: '' };
    skillInfoTitleEl.textContent = skill.name || 'Skill';
    skillInfoBodyEl.innerHTML = '<div>Loading summary...</div>';
    skillInfoOverlayEl.classList.add('open');
    skillInfoOverlayEl.setAttribute('aria-hidden', 'false');

    requestSkillSummary(skillName).then((summary) => {
      const summaryEn = String(summary.en || '').trim();
      const summaryZh = String(summary.zh || '').trim();
      skillInfoBodyEl.innerHTML = `
        <div><strong>English</strong>: ${escapeHtml(summaryEn)}</div>
        <div style="margin-top:8px;"><strong>中文</strong>：${escapeHtml(summaryZh)}</div>
      `;

  async function requestSkillSummary(skillName) {
    if (state.skillSummaryCache[skillName]) {
      return state.skillSummaryCache[skillName];
    }
    const skill = state.skills.find(s => s.name === skillName) || { name: skillName, description: '' };
    const fallbackEn = String(skill.summary_en || skill.description || `This skill supports workflows related to "${skillName}".`).trim();
    const fallbackZh = String(skill.summary_zh || `该技能主要用于：${fallbackEn}`).trim();

    try {
      const resp = await fetch('/api/skills/summary', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: skillName }),
      });
      const data = await resp.json();
      if (!resp.ok || data.type === 'error') {
        return { en: fallbackEn, zh: fallbackZh };
      }
      const payload = {
        en: String(data.summary_en || fallbackEn).trim(),
        zh: String(data.summary_zh || fallbackZh).trim(),
      };
      state.skillSummaryCache[skillName] = payload;
      return payload;
    } catch (_e) {
      return { en: fallbackEn, zh: fallbackZh };
    }
  }

  function closeSkillInfo() {
    skillInfoOverlayEl.classList.remove('open');
    skillInfoOverlayEl.setAttribute('aria-hidden', 'true');
  }

  function formatBytes(bytes) {
    if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB'];
    let val = bytes;
    let idx = 0;
    while (val >= 1024 && idx < units.length - 1) {
      val /= 1024;
      idx += 1;
    }
    return `${val.toFixed(val >= 10 || idx === 0 ? 0 : 1)} ${units[idx]}`;
  }

  function renderPendingFiles() {
    if (!state.pendingFiles.length && !state.selectedSkills.length) {
      attachListEl.innerHTML = '';
      return;
    }

    const skillChips = state.selectedSkills.map((name, idx) => `
      <span class="attach-chip skill-chip" title="Selected skill: ${escapeHtml(name)}">
        <span class="attach-name">${escapeHtml(name)}</span>
        <button class="attach-remove" data-skill-index="${idx}" type="button" aria-label="Remove skill">×</button>
      </span>
    `).join('');

    const fileChips = state.pendingFiles.map((f, idx) => `
      <span class="attach-chip" title="${escapeHtml(f.name)} (${formatBytes(f.size)})">
        <span class="attach-name">${escapeHtml(f.name)}</span>
        <span style="color:var(--text-muted)">${formatBytes(f.size)}</span>
        <button class="attach-remove" data-file-index="${idx}" type="button" aria-label="Remove file">×</button>
      </span>
    `).join('');

    attachListEl.innerHTML = skillChips + fileChips;
  }

  function addPendingFiles(fileList) {
    const incoming = Array.from(fileList || []);
    const rejected = [];

    for (const file of incoming) {
      const ext = '.' + String(file.name || '').split('.').pop().toLowerCase();
      if (!SUPPORTED_ATTACHMENT_EXTENSIONS.includes(ext)) {
        rejected.push(`${file.name} (unsupported type)`);
        continue;
      }
      if (file.size > MAX_ATTACHMENT_FILE_BYTES) {
        rejected.push(`${file.name} (too large, max ${formatBytes(MAX_ATTACHMENT_FILE_BYTES)})`);
        continue;
      }
      const duplicate = state.pendingFiles.some(f => f.name === file.name && f.size === file.size && f.lastModified === file.lastModified);
      if (!duplicate) state.pendingFiles.push(file);
    }

    if (rejected.length) {
      showError(`Some files were skipped:\n${rejected.slice(0, 3).join('\n')}`);
    }

    renderPendingFiles();
  }

  function clearPendingFiles() {
    state.pendingFiles = [];
    fileInputEl.value = '';
    renderPendingFiles();
  }

  function toggleSkillSelection(skillName) {
    const idx = state.selectedSkills.indexOf(skillName);
    if (idx >= 0) {
      state.selectedSkills.splice(idx, 1);
    } else {
      state.selectedSkills.push(skillName);
    }
    renderSkills(state.skills);
    renderPendingFiles();
  }

  function buildSkillInstruction(skills) {
    if (!skills.length) return '';
    return ['Selected skills:', ...skills.map(n => `- ${n}`), 'Use these skills when generating the response.'].join('\n');
  }

  async function buildAttachmentText(files) {
    if (!files.length) return '';

    const formData = new FormData();
    files.forEach(file => formData.append('files', file, file.name));

    let payload = null;
    try {
      const resp = await fetch('/api/attachments/parse', {
        method: 'POST',
        body: formData,
      });
      payload = await resp.json();
      if (!resp.ok || payload.type === 'error') {
        showError(payload.message || 'Attachment parser failed.');
        return '';
      }
    } catch (_e) {
      showError('Attachment parser is unavailable.');
      return '';
    }

    const blocks = [];
    const notes = [];
    const parsedFiles = Array.isArray(payload.files) ? payload.files : [];
    for (const item of parsedFiles) {
      const name = String(item.name || 'untitled');
      const size = Number(item.size || 0);
      const typeLabel = String(item.content_type || item.type || 'unknown');

      if (!item.ok) {
        notes.push(`- ${name} (${formatBytes(size)}, ${typeLabel}): ${String(item.error || 'unable to parse')}`);
        continue;
      }

      let textContent = String(item.text || '');
      if (textContent.length > MAX_EMBED_CHARS) {
        textContent = textContent.slice(0, MAX_EMBED_CHARS) + '\n[Content truncated]';
      }

      blocks.push([
        `### File: ${name}`,
        `Type: ${typeLabel}`,
        `Size: ${formatBytes(size)}`,
        '```text',
        textContent,
        '```',
      ].join('\n'));
    }

    if (!blocks.length && notes.length) {
      showError('No readable attachment content.');
      return '';
    }
    if (!blocks.length) return '';

    const chunks = ['Attached files:', ...blocks];
    if (notes.length) chunks.push('Attachment parser notes:\n' + notes.join('\n'));
    return chunks.join('\n\n');
  }

  function shouldAutoGenerateTitle(session) {
    if (!session) return false;
    const title = String(session.title || '').trim().toLowerCase();
    if (title && title !== 'new chat') return false;
    const userCount = session.messages.filter(m => m.role === 'user').length;
    const assistantCount = session.messages.filter(m => m.role === 'assistant').length;
    return userCount === 1 && assistantCount === 1;
  }

  async function requestAutoTitle(userText, assistantText) {
    try {
      const resp = await fetch('/api/chat/title', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: userText, assistant: assistantText }),
      });
      const data = await resp.json();
      if (!resp.ok || data.type === 'error') return '';
      return String(data.title || '').trim();
    } catch (_e) {
      return '';
    }
  }

  function clearMessages() {
    messagesEl.querySelectorAll('.msg').forEach(el => el.remove());

  function ensureMessageIds(session) {
    let changed = false;
    for (const m of session.messages) {

        changed = true;
      }

    if (changed) saveSessions();

  function addUserBubble(message, index) {

    div.className = 'msg user';

    const bubbleContent = state.editingMessageId === message.id
      ? `<textarea class="edit-textarea" data-edit-id="${escapeHtml(message.id)}">${escapeHtml(content)}</textarea>`
      : `${escapeHtml(content).replace(/\n/g, '<br>')}`;

    const actions = state.editingMessageId === message.id
      ? `
        <div class="msg-actions">
          ${actionButton('cancel-edit', message.id, 'Cancel', 'cancel')}
          ${actionButton('save-edit', message.id, 'Save', 'save')}
          ${actionButton('send-edit', message.id, 'Send', 'send')}
        </div>
      `
      : `
        <div class="msg-actions">
          ${actionButton('regenerate-user', message.id, 'Regen', 'regen')}
          ${actionButton('edit-user', message.id, 'Edit', 'edit')}
          ${actionButton('copy', message.id, 'Copy', 'copy')}

    div.innerHTML = `<div class="avatar-col"><button class="avatar avatar-btn" data-user-avatar-trigger="1" type="button" title="更换头像 / Change Avatar"><img src="${getUserAvatarSrcById(state.userAvatarId)}" alt="User"></button><div class="msg-time">${escapeHtml(timeLabel)}</div></div><div class="msg-main"><div class="bubble" data-msg-index="${index}">${bubbleContent}</div>${actions}</div>`;

  function addAssistantBubble(message, index) {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg assistant';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const timeLabel = formatMessageTime(message.time);
    const modelLabel = String(message.modelUsed || '').trim();
    const modelShort = formatModelDebugLabel(modelLabel);
    const metaLabel = modelShort ? `${timeLabel} · ${modelShort}` : timeLabel;
    const metaTitle = modelLabel ? ` title="${escapeHtml(modelLabel)}"` : '';
    wrapper.innerHTML = `<div class="avatar-col"><div class="avatar"><img src="${ASSISTANT_AVATAR_SRC}" alt="Assistant"></div><div class="msg-time"${metaTitle}>${escapeHtml(metaLabel)}</div></div>`;
    try {
      bubble.innerHTML = window.marked.parse(String(message.content || ''));
    } catch (_e) {
      bubble.innerHTML = fallbackMarkdown(String(message.content || ''));
    }
    bubble.setAttribute('data-msg-index', String(index));
    const actions = `
      <div class="msg-actions">
        ${actionButton('regenerate-assistant', message.id, 'Regen', 'regen')}
        ${actionButton('copy', message.id, 'Copy', 'copy')}
        ${actionButton('delete', message.id, 'Delete', 'delete')}
      </div>
    `;
    const main = document.createElement('div');
    main.className = 'msg-main';
    main.appendChild(bubble);
    main.insertAdjacentHTML('beforeend', actions);
    wrapper.appendChild(main);
    messagesEl.appendChild(wrapper);
    addCopyButtons(bubble);
    try { window.hljs.highlightAll(); } catch (_e) {}
